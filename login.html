<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — NEXUS AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #020610;
      font-family: 'Arial', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(26,58,92,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,58,92,0.15) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(26,58,92,0.4) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 0;
    }
    .card {
      position: relative; z-index: 1;
      background: rgba(10, 20, 40, 0.9);
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-radius: 24px;
      padding: 56px 48px;
      width: 100%; max-width: 480px;
      backdrop-filter: blur(10px);
    }
    .logo {
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .logo span { color: #4FC3F7; }
    .subtitle {
      text-align: center;
      color: rgba(232,240,250,0.5);
      font-size: 15px;
      margin-bottom: 40px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      color: rgba(232,240,250,0.7);
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      background: rgba(26,58,92,0.3);
      border: 1px solid rgba(79,195,247,0.2);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus { border-color: #4FC3F7; }
    .field.has-error input { border-color: #EF4444; }
    .forgot {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot a {
      color: #4FC3F7;
      font-size: 13px;
      text-decoration: none;
    }
    .btn {
      width: 100%;
      background: #1A3A5C;
      border: 2px solid #4FC3F7;
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn:hover { background: #4FC3F7; color: #020610; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      color: rgba(232,240,250,0.3);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(79,195,247,0.15);
    }
    .register-link {
      text-align: center;
      margin-top: 24px;
      color: rgba(232,240,250,0.5);
      font-size: 14px;
    }
    .register-link a { color: #4FC3F7; text-decoration: none; font-weight: 600; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #EF4444;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .success-card {
      text-align: center;
      display: none;
    }
    .success-card.show { display: block; }
    .success-icon {
      width: 80px; height: 80px;
      background: rgba(16,185,129,0.1);
      border: 2px solid #10B981;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    .success-title {
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 12px;
    }
    .success-sub {
      color: rgba(232,240,250,0.6);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-dashboard {
      display: inline-block;
      background: #4FC3F7;
      color: #020610;
      border-radius: 12px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="card">
    <div class="logo">NEXUS<span>AI</span></div>
    <div class="subtitle">Connecte-toi à ton compte</div>

    <div id="formWrap">
      <div class="error-msg" id="errorMsg"></div>
      <div class="field" id="fieldEmail">
        <label>Adresse email</label>
        <input type="email" id="email" placeholder="ton@email.com">
      </div>
      <div class="field" id="fieldPwd">
        <label>Mot de passe</label>
        <input type="password" id="pwd" placeholder="••••••••">
      </div>
      <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>
      <button class="btn" id="submitBtn" onclick="handleLogin()">Se connecter →</button>
    </div>

    <div class="success-card" id="successCard">
      <div class="success-icon">✓</div>
      <div class="success-title">Connecté !</div>
      <div class="success-sub">Bienvenue sur NEXUS AI.<br>Redirection vers ton dashboard...</div>
      <a href="/Onboarding.html" class="btn-dashboard">Accéder au dashboard →</a>
    </div>

    <div class="register-link" id="registerLink">
      Pas encore de compte ? <a href="/register.html">S'inscrire gratuitement</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://pgwwgwchlhmemkitrcxh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_gPqMnHI4GWUhrVitkZIUwQ_WwRZCgly';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('pwd').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errorMsg.style.display = 'none';

      if (!email || !pwd) {
        errorMsg.textContent = 'Merci de remplir tous les champs.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Connexion en cours...';

      try {
        const { data, error } = await sbClient.auth.signInWithPassword({ email, password: pwd });
        if (error) throw error;

        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('registerLink').style.display = 'none';
        document.getElementById('successCard').classList.add('show');

        setTimeout(() => { window.location.href = '/Onboarding.html'; }, 2000);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Se connecter →';
        errorMsg.textContent = 'Email ou mot de passe incorrect. Réessaye.';
        errorMsg.style.display = 'block';
      }
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
